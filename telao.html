<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telão - Cronômetro de Plenário</title>
<style>
  :root {
    --bg: #0a0f1e;
    --accent: #1e90ff;
    --text: #e8f0fe;
    --text-dim: #6b8cae;
    --green: #00c896;
    --yellow: #f5a623;
    --red: #e53935;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  .telao-wrapper {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }
  /* Mensagem */
  .t-mensagem {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 3.2vw;
    font-weight: 700;
    color: var(--red);
    letter-spacing: 4px;
    text-transform: uppercase;
    min-height: 5vh;
    text-align: center;
    margin-bottom: 1vh;
  }
  /* Vereador */
  .t-vereador {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 2.8vw;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    min-height: 5vh;
    text-align: center;
    margin-bottom: 2vh;
  }
  /* Cronômetro principal */
  .t-principal {
    font-size: 22vw;
    font-weight: 900;
    letter-spacing: 2vw;
    color: var(--white);
    text-align: center;
    line-height: 1;
    transition: color 0.3s;
  }
  .t-principal.amarelo { color: var(--yellow); }
  .t-principal.vermelho { color: var(--red); }
  @keyframes pisca { 0%,100%{opacity:1} 50%{opacity:0} }
  .t-principal.piscando { animation: pisca 0.6s infinite; }
  /* Tempo excedido */
  .t-excedido {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 3vw;
    font-weight: 700;
    color: var(--red);
    letter-spacing: 6px;
    text-transform: uppercase;
    min-height: 5vh;
    text-align: center;
    margin-top: 1vh;
  }
  .t-excedido.piscando { animation: pisca 0.6s infinite; }
  /* Secundários */
  .t-row-sec {
    display: flex;
    gap: 6vw;
    margin-top: 2vh;
    align-items: flex-end;
  }
  .t-sec {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .t-sec-label {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 1.2vw;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .t-sec-display {
    font-size: 5.5vw;
    font-weight: 900;
    letter-spacing: 0.4vw;
    color: var(--white);
    transition: color 0.3s;
  }
  .t-sec-display.amarelo { color: var(--yellow); }
  .t-sec-display.vermelho { color: var(--red); }
  .t-sec-display.piscando { animation: pisca 0.6s infinite; }
  /* Rodapé */
  .t-footer {
    position: absolute;
    bottom: 1.5vh;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 0.9vw;
    color: var(--text-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  /* Aguardando */
  .t-aguardando {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 1.5vw;
    color: var(--text-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.5;
  }
</style>
</head>
<body>
<div class="telao-wrapper">
  <div class="t-mensagem"  id="t-mensagem"></div>
  <div class="t-vereador"  id="t-vereador"></div>
  <div class="t-principal" id="t-principal">--:--</div>
  <div class="t-excedido"  id="t-excedido"></div>
  <div class="t-row-sec">
    <div class="t-sec">
      <div class="t-sec-label">Aparte</div>
      <div class="t-sec-display" id="t-aparte">01:00</div>
    </div>
    <div class="t-sec">
      <div class="t-sec-label">Questão de Ordem</div>
      <div class="t-sec-display" id="t-qo">02:00</div>
    </div>
  </div>
  <div class="t-footer">Câmara Municipal — Cronômetro de Plenário</div>
</div>
<script>
var bc = new BroadcastChannel('cronometro-plenario');
function fmt(s){
  var neg=s<0,abs=Math.abs(s),m=Math.floor(abs/60),ss=abs%60;
  return (neg?'-':'')+String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');
}
bc.onmessage = function(e){
  var d = e.data;
  if(d.tipo !== 'estado') return;

  // Mensagem
  document.getElementById('t-mensagem').textContent = d.mensagem || '';

  // Vereador
  var v = (d.vereador && d.vereador !== '—') ? d.vereador : '';
  document.getElementById('t-vereador').textContent = v;

  // Principal
  var rp = d.principal.restante;
  var ep = document.getElementById('t-principal');
  var ex = document.getElementById('t-excedido');
  ep.textContent = fmt(rp);
  ep.className = 't-principal';
  ex.textContent = '';
  ex.className = 't-excedido';
  if(rp <= 0){
    ep.className = 't-principal vermelho piscando';
    ex.textContent = 'TEMPO EXCEDIDO';
    ex.className = 't-excedido piscando';
  } else if(rp <= 60){
    ep.className = 't-principal amarelo';
  }

  // Aparte
  var ra = d.aparte.restante;
  var ea = document.getElementById('t-aparte');
  ea.textContent = fmt(ra);
  ea.className = 't-sec-display';
  if(ra <= 0) ea.className = 't-sec-display vermelho piscando';
  else if(ra <= 30) ea.className = 't-sec-display amarelo';

  // QO
  var rq = d.qo.restante;
  var eq = document.getElementById('t-qo');
  eq.textContent = fmt(rq);
  eq.className = 't-sec-display';
  if(rq <= 0) eq.className = 't-sec-display vermelho piscando';
  else if(rq <= 60) eq.className = 't-sec-display amarelo';
};
</script>
</body>
</html>
