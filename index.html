<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronômetro de Plenário</title>
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --accent: #1e90ff;
    --accent2: #0a4a8f;
    --text: #e8f0fe;
    --text-dim: #6b8cae;
    --green: #00c896;
    --yellow: #f5a623;
    --red: #e53935;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    user-select: none;
  }
  header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  header h1 {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  header .badge {
    font-size: 0.7rem;
    background: var(--accent2);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  #mensagem-display {
    width: 100%;
    max-width: 900px;
    min-height: 34px;
    color: var(--red);
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .timer-card {
    width: 100%;
    max-width: 900px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px 14px;
    margin-bottom: 10px;
  }
  .timer-card .label {
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .timer-display {
    font-size: 5.5rem;
    font-weight: 900;
    letter-spacing: 6px;
    font-variant-numeric: tabular-nums;
    color: var(--white);
    text-align: center;
    line-height: 1;
    margin-bottom: 10px;
    transition: color 0.3s;
    font-family: 'Courier New', monospace;
  }
  .timer-display.amarelo { color: var(--yellow); }
  .timer-display.vermelho { color: var(--red); }
  @keyframes pisca { 0%,100%{opacity:1} 50%{opacity:0} }
  .timer-display.piscando { animation: pisca 0.6s infinite; }
  .tempo-excedido {
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--red);
    text-transform: uppercase;
    height: 22px;
    margin-bottom: 8px;
  }
  .tempo-excedido.piscando { animation: pisca 0.6s infinite; }
  .tempo-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 10px;
  }
  .tempo-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 600;
  }
  .tempo-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tempo-btn.ativo { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tempo-custom {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 12px;
    align-items: center;
  }
  .tempo-custom input {
    width: 70px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 0.85rem;
    text-align: center;
    outline: none;
  }
  .tempo-custom input:focus { border-color: var(--accent); }
  .tempo-custom label { font-size: 0.8rem; color: var(--text-dim); }
  .tempo-custom button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tempo-custom button:hover { border-color: var(--accent); color: var(--accent); }
  .controles {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    border: none;
    border-radius: 8px;
    padding: 10px 28px;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .btn-play  { background: var(--green);  color: #000; }
  .btn-pause { background: var(--yellow); color: #000; }
  .btn-reset { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); }
  .btn:hover { filter: brightness(1.15); }
  .btn:active { transform: scale(0.97); }
  .row-bottom {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .mini-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .mini-card .label {
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .mini-display {
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 3px;
    font-variant-numeric: tabular-nums;
    color: var(--white);
    font-family: 'Courier New', monospace;
    text-align: center;
    line-height: 1;
    margin-bottom: 8px;
    transition: color 0.3s;
  }
  .mini-display.amarelo { color: var(--yellow); }
  .mini-display.vermelho { color: var(--red); }
  .mini-display.piscando { animation: pisca 0.6s infinite; }
  .mini-controles {
    display: flex;
    gap: 5px;
    justify-content: center;
  }
  .mini-btn {
    border: none;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .mini-btn-play  { background: var(--green);  color: #000; }
  .mini-btn-pause { background: var(--yellow); color: #000; }
  .mini-btn-reset { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); }
  .mini-btn:hover { filter: brightness(1.15); }
  .vereador-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
  }
  .vereador-card .label {
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .vereador-nome {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    min-height: 22px;
    margin-bottom: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .vereador-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 0.8rem;
    outline: none;
    width: 100%;
    margin-bottom: 6px;
    cursor: pointer;
  }
  .vereador-select:focus { border-color: var(--accent); }
  .btn-limpar-vereador {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.72rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    width: 100%;
  }
  .btn-limpar-vereador:hover { border-color: var(--red); color: var(--red); }
  .mensagem-card {
    width: 100%;
    max-width: 900px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
  }
  .mensagem-card .label {
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .mensagem-card input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.85rem;
    outline: none;
  }
  .mensagem-card input:focus { border-color: var(--accent); }
  .mensagem-card button {
    background: var(--accent2);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .mensagem-card button:hover { background: var(--accent); color: #fff; }
  .mensagem-card .btn-limpar-msg {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .mensagem-card .btn-limpar-msg:hover { border-color: var(--red); color: var(--red); background: var(--surface2); }
  footer {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 0;
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .btn-telao {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 0.7rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .btn-telao:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>Cronômetro de Plenário</h1>
  <span class="badge">Controle</span>
</header>

<div id="mensagem-display"></div>

<div class="timer-card">
  <div class="label">Cronômetro Principal</div>
  <div class="timer-display" id="display-principal">10:00</div>
  <div class="tempo-excedido" id="excedido-principal"></div>
  <div class="tempo-btns">
    <button class="tempo-btn" onclick="selecionarTempo(1,this)">1 min</button>
    <button class="tempo-btn" onclick="selecionarTempo(3,this)">3 min</button>
    <button class="tempo-btn" onclick="selecionarTempo(5,this)">5 min</button>
    <button class="tempo-btn ativo" onclick="selecionarTempo(10,this)">10 min</button>
    <button class="tempo-btn" onclick="selecionarTempo(15,this)">15 min</button>
    <button class="tempo-btn" onclick="selecionarTempo(20,this)">20 min</button>
    <button class="tempo-btn" onclick="selecionarTempo(30,this)">30 min</button>
  </div>
  <div class="tempo-custom">
    <label>Personalizado:</label>
    <input type="number" id="custom-min" min="1" max="99" placeholder="min">
    <input type="number" id="custom-sec" min="0" max="59" placeholder="seg">
    <button onclick="aplicarPersonalizado()">Aplicar</button>
  </div>
  <div class="controles">
    <button class="btn btn-play"  id="btn-play-principal"  onclick="playPrincipal()">&#9654; Iniciar</button>
    <button class="btn btn-pause" id="btn-pause-principal" onclick="pausePrincipal()" style="display:none">&#9646;&#9646; Pausar</button>
    <button class="btn btn-reset"                          onclick="resetPrincipal()">&#8634; Reset</button>
  </div>
</div>

<div class="row-bottom">
  <div class="mini-card">
    <div class="label">Aparte</div>
    <div class="mini-display" id="display-aparte">01:00</div>
    <div class="mini-controles">
      <button class="mini-btn mini-btn-play"  id="btn-play-aparte"  onclick="playAparte()">&#9654;</button>
      <button class="mini-btn mini-btn-pause" id="btn-pause-aparte" onclick="pauseAparte()" style="display:none">&#9646;&#9646;</button>
      <button class="mini-btn mini-btn-reset"                        onclick="resetSecundario()">&#8634;</button>
    </div>
  </div>
  <div class="mini-card">
    <div class="label">Quest&#227;o de Ordem</div>
    <div class="mini-display" id="display-qo">02:00</div>
    <div class="mini-controles">
      <button class="mini-btn mini-btn-play"  id="btn-play-qo"  onclick="playQO()">&#9654;</button>
      <button class="mini-btn mini-btn-pause" id="btn-pause-qo" onclick="pauseQO()" style="display:none">&#9646;&#9646;</button>
      <button class="mini-btn mini-btn-reset"                    onclick="resetSecundario()">&#8634;</button>
    </div>
  </div>
  <div class="vereador-card">
    <div class="label">Vereador</div>
    <div class="vereador-nome" id="vereador-nome">&#8212;</div>
    <select class="vereador-select" id="vereador-select" onchange="selecionarVereador(this.value)">
      <option value="">Selecionar...</option>
      <option>BINA</option>
      <option>DR. ERALDO</option>
      <option>EDILSON MARTINS</option>
      <option>ELIANE DO CAF&#201;</option>
      <option>ELVIRA LIMA</option>
      <option>ESCRIVÃO PARMA</option>
      <option>H&#201;LIO HG</option>
      <option>JADIR SOARES - PEPITA</option>
      <option>MARCIO BERBET</option>
      <option>MARCIO MORAES</option>
      <option>PROF. GERALDO</option>
      <option>SIDINEI JARDIM</option>
      <option>SUBTENENTE MACEDO</option>
    </select>
    <button class="btn-limpar-vereador" onclick="limparVereador()">Limpar</button>
  </div>
</div>

<div class="mensagem-card">
  <span class="label">Mensagem</span>
  <input type="text" id="mensagem-input" placeholder="Digite uma mensagem..." maxlength="120">
  <button onclick="enviarMensagem()">Exibir</button>
  <button class="btn-limpar-msg" onclick="limparMensagem()">Limpar</button>
</div>

<footer>
  <span>C&#226;mara Municipal</span>
  <button class="btn-telao" onclick="abrirTelao()">&#128250; Abrir Tel&#227;o</button>

<script>
var principal = {total:600,restante:600,rodando:false,intervalo:null,tempoBase:600,alertaDisparado:false,encerramentoDisparado:false};
var aparte    = {total:60, restante:60, rodando:false,intervalo:null,alertaDisparado:false,encerramentoDisparado:false};
var qo        = {total:120,restante:120,rodando:false,intervalo:null,alertaDisparado:false,encerramentoDisparado:false};
var bc = new BroadcastChannel('cronometro-plenario');

function fmt(s){
  var neg=s<0,abs=Math.abs(s),m=Math.floor(abs/60),ss=abs%60;
  return (neg?'-':'')+String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');
}
function tocarAlerta()       {document.getElementById('audio-alerta').currentTime=0;document.getElementById('audio-alerta').play().catch(function(){});}
function tocarEncerramento() {document.getElementById('audio-encerramento').currentTime=0;document.getElementById('audio-encerramento').play().catch(function(){});}
function broadcastEstado(){
  bc.postMessage({
    tipo:'estado',
    principal:{restante:principal.restante,rodando:principal.rodando},
    aparte:{restante:aparte.restante,rodando:aparte.rodando},
    qo:{restante:qo.restante,rodando:qo.rodando},
    vereador:document.getElementById('vereador-nome').textContent,
    mensagem:document.getElementById('mensagem-display').textContent
  });
}

function atualizarDisplayPrincipal(){
  var el=document.getElementById('display-principal');
  var ex=document.getElementById('excedido-principal');
  var r=principal.restante;
  el.textContent=fmt(r);
  el.className='timer-display';
  ex.textContent='';
  ex.className='tempo-excedido';
  var limiteAlerta=principal.tempoBase===60?30:60;
  if(r<=0){
    el.className='timer-display vermelho piscando';
    ex.textContent='TEMPO EXCEDIDO';
    ex.className='tempo-excedido piscando';
    if(!principal.encerramentoDisparado){tocarEncerramento();principal.encerramentoDisparado=true;}
  }else if(r<=limiteAlerta){
    el.className='timer-display amarelo';
    if(!principal.alertaDisparado){tocarAlerta();principal.alertaDisparado=true;}
  }
  broadcastEstado();
}
function selecionarTempo(min,btn){
  document.querySelectorAll('.tempo-btn').forEach(function(b){b.classList.remove('ativo');});
  if(btn)btn.classList.add('ativo');
  var seg=min*60;
  principal.total=seg;principal.tempoBase=seg;
  if(!principal.rodando){principal.restante=seg;atualizarDisplayPrincipal();}
}
function aplicarPersonalizado(){
  var m=parseInt(document.getElementById('custom-min').value)||0;
  var s=parseInt(document.getElementById('custom-sec').value)||0;
  var total=m*60+s;
  if(total<=0)return;
  document.querySelectorAll('.tempo-btn').forEach(function(b){b.classList.remove('ativo');});
  principal.total=total;principal.tempoBase=total;
  if(!principal.rodando){principal.restante=total;atualizarDisplayPrincipal();}
}
function playPrincipal(){
  if(principal.rodando)return;
  principal.rodando=true;
  document.getElementById('btn-play-principal').style.display='none';
  document.getElementById('btn-pause-principal').style.display='';
  principal.intervalo=setInterval(function(){principal.restante--;atualizarDisplayPrincipal();},1000);
}
function pausePrincipal(){
  principal.rodando=false;clearInterval(principal.intervalo);
  document.getElementById('btn-play-principal').style.display='';
  document.getElementById('btn-pause-principal').style.display='none';
  broadcastEstado();
}
function resetPrincipal(){
  pausePrincipal();
  principal.restante=principal.tempoBase;
  principal.alertaDisparado=false;principal.encerramentoDisparado=false;
  atualizarDisplayPrincipal();
}

function atualizarDisplayAparte(){
  var el=document.getElementById('display-aparte');
  var r=aparte.restante;
  el.textContent=fmt(r);
  el.className='mini-display';
  if(r<=0){
    el.className='mini-display vermelho piscando';
    if(!aparte.encerramentoDisparado){tocarEncerramento();aparte.encerramentoDisparado=true;}
  }else if(r<=30){
    el.className='mini-display amarelo';
    if(!aparte.alertaDisparado){tocarAlerta();aparte.alertaDisparado=true;}
  }
  broadcastEstado();
}
function playAparte(){
  if(aparte.rodando)return;
  if(qo.rodando)pauseQO();
  aparte.rodando=true;
  document.getElementById('btn-play-aparte').style.display='none';
  document.getElementById('btn-pause-aparte').style.display='';
  aparte.intervalo=setInterval(function(){aparte.restante--;atualizarDisplayAparte();},1000);
}
function pauseAparte(){
  aparte.rodando=false;clearInterval(aparte.intervalo);
  document.getElementById('btn-play-aparte').style.display='';
  document.getElementById('btn-pause-aparte').style.display='none';
  broadcastEstado();
}

function atualizarDisplayQO(){
  var el=document.getElementById('display-qo');
  var r=qo.restante;
  el.textContent=fmt(r);
  el.className='mini-display';
  if(r<=0){
    el.className='mini-display vermelho piscando';
    if(!qo.encerramentoDisparado){tocarEncerramento();qo.encerramentoDisparado=true;}
  }else if(r<=60){
    el.className='mini-display amarelo';
    if(!qo.alertaDisparado){tocarAlerta();qo.alertaDisparado=true;}
  }
  broadcastEstado();
}
function playQO(){
  if(qo.rodando)return;
  if(aparte.rodando)pauseAparte();
  qo.rodando=true;
  document.getElementById('btn-play-qo').style.display='none';
  document.getElementById('btn-pause-qo').style.display='';
  qo.intervalo=setInterval(function(){qo.restante--;atualizarDisplayQO();},1000);
}
function pauseQO(){
  qo.rodando=false;clearInterval(qo.intervalo);
  document.getElementById('btn-play-qo').style.display='';
  document.getElementById('btn-pause-qo').style.display='none';
  broadcastEstado();
}
function resetSecundario(){
  pauseAparte();pauseQO();
  aparte.restante=60;aparte.alertaDisparado=false;aparte.encerramentoDisparado=false;
  qo.restante=120;qo.alertaDisparado=false;qo.encerramentoDisparado=false;
  atualizarDisplayAparte();atualizarDisplayQO();
}

function selecionarVereador(v){document.getElementById('vereador-nome').textContent=v||'—';broadcastEstado();}
function limparVereador(){document.getElementById('vereador-select').value='';document.getElementById('vereador-nome').textContent='—';broadcastEstado();}
function enviarMensagem(){
  var txt=document.getElementById('mensagem-input').value.trim().toUpperCase();
  document.getElementById('mensagem-display').textContent=txt;
  broadcastEstado();
}
function limparMensagem(){
  document.getElementById('mensagem-input').value='';
  document.getElementById('mensagem-display').textContent='';
  broadcastEstado();
}
document.getElementById('mensagem-input').addEventListener('keydown',function(e){if(e.key==='Enter')enviarMensagem();});
function abrirTelao(){window.open('telao.html','_blank');setTimeout(broadcastEstado,800);}
</script>
